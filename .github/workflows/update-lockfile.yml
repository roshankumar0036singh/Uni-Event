name: Update package-lock.json

on:
    push:
        branches:
            - main
        paths:
            - 'package.json'
            - 'app/package.json'
            - 'cloud-functions/package.json'

permissions:
    contents: write

jobs:
    update-lockfile:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: Update root lockfile
              if: hashFiles('package.json') != ''
              run: npm install --package-lock-only --ignore-scripts

            - name: Update app lockfile
              if: hashFiles('app/package.json') != ''
              run: |
                  cd app
                  npm install --package-lock-only --ignore-scripts

            - name: Update cloud-functions lockfile
              if: hashFiles('cloud-functions/package.json') != ''
              run: |
                  cd cloud-functions
                  npm install --package-lock-only --ignore-scripts

            - uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: 'chore: update package-lock.json'
