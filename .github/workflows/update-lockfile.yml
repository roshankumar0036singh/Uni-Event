name: Update package-lock.json

on:
    push:
        branches:
            - main
        paths:
            - 'package.json'
            - 'app/package.json'
            - 'cloud-functions/package.json'

permissions:
    contents: write
    pull-requests: write

jobs:
    update-lockfile:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Update root lockfile
              run: npm install --package-lock-only --ignore-scripts

            - name: Update app lockfile
              run: |
                  cd app
                  npm install --package-lock-only --ignore-scripts

            - name: Update cloud-functions lockfile
              run: |
                  cd cloud-functions
                  npm install --package-lock-only --ignore-scripts

            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v6
              with:
                  commit-message: 'chore: update package-lock.json'
                  title: 'chore: update package-lock.json'
                  body: 'Automated PR to update package-lock.json.'
                  branch: 'update-lockfiles-pr'
                  base: 'main'
