name: Auto Assign Contributor

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    name: Assign Contributor
    if: github.event.issue.pull_request == null && (contains(github.event.comment.body, '/assign') || contains(github.event.comment.body, format('@{0}', github.repository_owner)))
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Auto Assign
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const user = context.payload.comment.user.login;

            // 1. Check if the issue is already assigned
            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number,
            });

            if (issue.data.assignees.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Hey @${user}, this issue is already assigned to someone else. Please look for other unassigned issues!`,
              });
              return;
            }

            // 2. Check if the user already has an open issue assigned to them
            const assignedIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              assignee: user,
              state: 'open',
            });

            if (assignedIssues.data.length > 0) {
              const otherIssue = assignedIssues.data[0].number;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Hey @${user}, you already have an open issue assigned to you (#${otherIssue}). Please complete that one before taking on another!`,
              });
              return;
            }

            // 3. Assign the user
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [user],
            });

            // 4. Confirmation comment with star reminder
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `Assigned @${user} to this issue! Happy contributing! 🎉\n\nIf you haven't already, please consider giving this repository a ⭐ to show your support!`,
            });
