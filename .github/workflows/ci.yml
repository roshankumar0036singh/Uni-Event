name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ── Update Dependencies via PR ────────────────────────────────────
    update-dependencies:
        name: Update Dependencies
        runs-on: ubuntu-latest
        if: github.event_name == 'push'
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Set up Node.js 20
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '20'

            - name: Update app dependencies
              working-directory: ./app
              run: npm ci

            - name: Update cloud-functions dependencies
              working-directory: ./cloud-functions
              run: npm ci

            - name: Create Pull Request for dependency updates
              uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'chore: update package-lock.json [skip ci]'
                  branch: chore/update-dependencies
                  title: 'chore: update package-lock.json files'
                  body: |
                      Automated dependency updates for both app and cloud-functions.
                      This PR was created automatically by the CI workflow.
                  delete-branch: true
                  labels: dependencies, automated

    # ── App & Cloud Functions: Lint + Test ──────────────────────────
    lint-and-test:
        name: Lint & Test
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Set up Node.js 20
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: '**/package-lock.json'

            - name: Install dependencies (app)
              working-directory: ./app
              run: npm ci

            - name: Install dependencies (cloud-functions)
              working-directory: ./cloud-functions
              run: npm ci

            - name: Auto-format with Prettier (app)
              if: github.event_name == 'push'
              working-directory: ./app
              run: npm run format

            - name: Auto-format with Prettier (cloud-functions)
              if: github.event_name == 'push'
              working-directory: ./cloud-functions
              run: npm run format

            - name: Create PR for formatted files
              if: github.event_name == 'push'
              uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'style: auto-format with prettier'
                  branch: auto-format/prettier
                  title: 'style: auto-format with prettier'
                  body: |
                      Automated Prettier formatting applied.
                      This PR was created automatically by the CI workflow.
                  delete-branch: true
                  labels: formatting, automated

            - name: Run Prettier check (app)
              working-directory: ./app
              run: npm run format:check

            - name: Run Prettier check (cloud-functions)
              working-directory: ./cloud-functions
              run: npm run format:check

            - name: Run ESLint (app)
              working-directory: ./app
              run: npm run lint

            - name: Run ESLint (cloud-functions)
              working-directory: ./cloud-functions
              run: npm run lint

            - name: Run Jest tests (app)
              working-directory: ./app
              run: npm test -- --ci --passWithNoTests
