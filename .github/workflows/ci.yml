name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  core-flow-tests:
    name: Core Flow Tests (Firebase emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Run Firebase emulator flow tests with coverage
        run: npm run test:flows

      - name: Report coverage
        if: always()
        run: |
          node -e "const fs=require('fs');const p='coverage/coverage-summary.json';if(!fs.existsSync(p)){console.log('No coverage summary found.');process.exit(0)};const s=require('./'+p).total;const lines=['## Core Firebase Flow Coverage','| Metric | Covered | Total | Percent |','| --- | ---: | ---: | ---: |',...['statements','branches','functions','lines'].map(k=>'| '+k+' | '+s[k].covered+' | '+s[k].total+' | '+s[k].pct+'% |')];fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines.join('\n')+'\n');"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-flow-coverage
          path: coverage

  # ── App: Lint + Test ─────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test (app)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest tests
        run: npm test -- --ci --passWithNoTests

  auto-format:
    name: Auto-format app
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Auto-format with Prettier
        working-directory: ./app
        run: npx prettier --write .

      - name: Create PR for formatted files
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: auto-format with prettier"
          branch: auto-format/prettier
          title: "style: auto-format with prettier"
          body: |
            Automated Prettier formatting applied.
            This PR was created automatically by the CI workflow.
          delete-branch: true
          labels: formatting, automated
