<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #f4f6f8; display: flex; flex-wrap: wrap; gap: 30px; padding: 40px; justify-content: center; }
  .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 200px; }
  .title { font-weight: 700; font-size: 16px; margin-bottom: 6px; color: #333; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>

<div class="card">
  <div class="title">Pulling</div>
  <div class="subtitle">Progress: 40%</div>
  <svg width="100" height="100" viewBox="0 0 100 100">
    <path d="M50 15 C58 28 63 35 58 48 C55 56 52 65 50 68 C48 65 45 56 42 48 C37 35 42 28 50 15Z" fill="#FFB74D" opacity="0.5"/>
  </svg>
</div>

<div class="card">
  <div class="title">Pulling</div>
  <div class="subtitle">Progress: 70%</div>
  <svg width="100" height="100" viewBox="0 0 100 100">
    <path d="M50 8 C60 22 68 32 62 48 C58 58 53 70 50 74 C47 70 42 58 38 48 C32 32 40 22 50 8Z" fill="#FFB74D" opacity="0.8"/>
  </svg>
</div>

<div class="card">
  <div class="title">Ready</div>
  <div class="subtitle">Threshold reached!</div>
  <svg width="100" height="100" viewBox="0 0 100 100">
    <path d="M50 5 C62 20 70 32 64 50 C58 62 53 72 50 78 C47 72 42 62 36 50 C30 32 38 20 50 5Z" fill="#FFB74D">
      <animate attributeName="d" dur="0.6s" repeatCount="indefinite"
        values="M50 5 C62 20 70 32 64 50 C58 62 53 72 50 78 C47 72 42 62 36 50 C30 32 38 20 50 5Z;
                M50 2 C64 18 73 32 66 52 C60 64 54 74 50 82 C46 74 40 64 34 52 C27 32 36 18 50 2Z;
                M50 5 C62 20 70 32 64 50 C58 62 53 72 50 78 C47 72 42 62 36 50 C30 32 38 20 50 5Z"/>
    </path>
  </svg>
</div>

<div class="card">
  <div class="title">Refreshing</div>
  <div class="subtitle">Splash!</div>
  <svg width="100" height="100" viewBox="0 0 100 100">
    <path d="M50 5 C62 20 70 32 64 50 C58 62 53 72 50 78 C47 72 42 62 36 50 C30 32 38 20 50 5Z" fill="#FFB74D" opacity="0.6"/>
    <circle cx="60" cy="22" r="3" fill="#FFB74D" opacity="0.7"><animate attributeName="cy" from="22" to="70" dur="0.5s"/><animate attributeName="opacity" from="0.9" to="0" dur="0.5s"/></circle>
    <circle cx="40" cy="24" r="2.5" fill="#FFB74D" opacity="0.7"><animate attributeName="cy" from="24" to="72" dur="0.5s"/><animate attributeName="opacity" from="0.9" to="0" dur="0.5s"/></circle>
    <circle cx="70" cy="30" r="2" fill="#FFB74D" opacity="0.6"><animate attributeName="cy" from="30" to="78" dur="0.5s"/><animate attributeName="opacity" from="0.8" to="0" dur="0.5s"/></circle>
    <circle cx="30" cy="32" r="3.5" fill="#FFB74D" opacity="0.6"><animate attributeName="cy" from="32" to="76" dur="0.5s"/><animate attributeName="opacity" from="0.8" to="0" dur="0.5s"/></circle>
    <circle cx="55" cy="18" r="2" fill="#FFB74D" opacity="0.8"><animate attributeName="cy" from="18" to="66" dur="0.5s"/><animate attributeName="opacity" from="0.9" to="0" dur="0.5s"/></circle>
  </svg>
</div>

</body>
</html>
